name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      ai_service: ${{ steps.filter.outputs.ai_service }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Detect changed areas
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = new Set();

            if (context.eventName === "pull_request") {
              const pull_number = context.payload.pull_request.number;
              const pages = github.paginate.iterator(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });

              for await (const { data } of pages) {
                for (const file of data) {
                  files.add(file.filename);
                }
              }
            } else {
              const before = context.payload.before;
              const after = context.payload.after;

              if (!before || /^0+$/.test(before)) {
                core.info("No comparable base commit found; running all CI jobs.");
                core.setOutput("web", "true");
                core.setOutput("ai_service", "true");
                core.setOutput("backend", "true");
                return;
              }

              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${before}...${after}`,
                per_page: 100,
              });

              for (const file of comparison.data.files ?? []) {
                files.add(file.filename);
              }

              if ((comparison.data.files ?? []).length >= 300) {
                core.info("Large change set may be truncated; running all CI jobs.");
                core.setOutput("web", "true");
                core.setOutput("ai_service", "true");
                core.setOutput("backend", "true");
                return;
              }
            }

            const changed = [...files];
            const workflowChanged = changed.some((path) => path.startsWith(".github/workflows/"));
            const rootWebFiles = new Set([
              "package.json",
              "pnpm-lock.yaml",
              "pnpm-workspace.yaml",
              "turbo.json",
            ]);

            const web = workflowChanged || changed.some((path) =>
              path.startsWith("apps/web/") ||
              path.startsWith("packages/") ||
              rootWebFiles.has(path)
            );
            const aiService = workflowChanged || changed.some((path) =>
              path.startsWith("services/ai-service/")
            );
            const backend = workflowChanged || changed.some((path) =>
              path.startsWith("apps/backend/")
            );

            core.info(`Changed files: ${changed.length ? changed.join(", ") : "none"}`);
            core.setOutput("web", String(web));
            core.setOutput("ai_service", String(aiService));
            core.setOutput("backend", String(backend));

  web-ci:
    name: Web CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            apps/web
            packages
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            turbo.json
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Dependencies
        run: pnpm install --filter web... --frozen-lockfile
      - name: Lint Web
        run: pnpm --filter web lint
      - name: TypeScript Type Check
        run: pnpm --filter web typecheck
      - name: Build Web
        run: pnpm --filter web build

  ai-service-ci:
    name: AI Service CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ai_service == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/ci.yml
            services/ai-service
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ai-service/requirements-ci.txt
      - name: Install Dependencies
        working-directory: ./services/ai-service
        run: pip install --default-timeout=100 -r requirements-ci.txt
      - name: Syntax Check
        working-directory: ./services/ai-service
        run: python -m py_compile main.py
      - name: Run Tests
        working-directory: ./services/ai-service
        run: python -m pytest tests/ -v --tb=short

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/ci.yml
            apps/backend/skillfuze
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Test Backend
        working-directory: ./apps/backend/skillfuze
        run: |
          chmod +x ./mvnw
          ./mvnw test
